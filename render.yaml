# NWRMA Render Blueprint — API + Next.js web.
# Manual service (e.g. NWRMA-1): Settings must match the service you want:
#   Web: Build = node scripts/render-build-web.mjs   Start = npm run start:web
#   API: Build = node scripts/render-build-api.mjs   Start = npm run start:api
# Set SKIP_INSTALL_DEPS=true so Render does not run a separate yarn/npm install.

services:
  - type: web
    name: nwrma-api
    runtime: node
    plan: free
    buildCommand: node scripts/render-build-api.mjs
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SEED_WEB_ADMIN_EMAIL
        sync: false
      - key: SEED_WEB_ADMIN_PASSWORD
        sync: false
      - key: SEED_MOBILE_OFFICER_PHONE
        sync: false
      - key: SEED_MOBILE_OFFICER_PASSWORD
        sync: false

  - type: web
    name: nwrma-web
    runtime: node
    plan: free
    buildCommand: node scripts/render-build-web.mjs
    startCommand: npm run start:web
    healthCheckPath: /api/health/db
    disk:
      name: nwrma-uploads
      mountPath: /opt/render/project/src/web/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: NWRMA_SERVER_URL
        sync: false
      - key: NEXT_PUBLIC_NWRMA_SERVER_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: INVITE_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
