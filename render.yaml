# NWRMA Render Blueprint — API (field phones) + Next.js ERP/web.
# Dashboard: New → Blueprint → connect repo. Re-sync after pushes to pick up start commands.
#
# If deploy runs "yarn start" and fails: Blueprint → Sync, or set Start Command manually:
#   nwrma-api: npm run start:api
#   nwrma-web: npm run start:web

services:
  - type: web
    name: nwrma-api
    runtime: node
    plan: free
    buildCommand: npm run build:render:api
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SEED_WEB_ADMIN_EMAIL
        sync: false
      - key: SEED_WEB_ADMIN_PASSWORD
        sync: false
      - key: SEED_MOBILE_OFFICER_PHONE
        sync: false
      - key: SEED_MOBILE_OFFICER_PASSWORD
        sync: false

  - type: web
    name: nwrma-web
    runtime: node
    plan: free
    buildCommand: npm run build:render:web
    startCommand: npm run start:web
    healthCheckPath: /api/health/db
    disk:
      name: nwrma-uploads
      mountPath: /opt/render/project/src/web/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: NWRMA_SERVER_URL
        sync: false
      - key: NEXT_PUBLIC_NWRMA_SERVER_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: INVITE_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
